<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Pro V5.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }

        /* การตั้งค่าระบบการพิมพ์ระดับมืออาชีพ */
        @media print {
            body { background: white; margin: 0; padding: 0; }
            .no-print { display: none !important; }
            #pdf-content { display: block !important; padding: 0; margin: 0; }
            
            @page { size: A4; margin: 0; }

            .print-page {
                width: 210mm;
                height: 297mm;
                padding: 12mm;
                box-sizing: border-box;
                page-break-after: always;
                display: flex;
                flex-direction: column;
                position: relative;
            }

            /* ระบบ Grid 4 รายการต่อหน้า (2x2) */
            .grid-container {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                grid-template-rows: repeat(2, 1fr);
                gap: 10px;
                flex-grow: 1;
                margin-top: 15px;
            }

            .defect-card {
                border: 1px solid #cbd5e1;
                display: flex;
                flex-direction: column;
                background: #fff;
                overflow: hidden;
            }

            .defect-info {
                background: #f8fafc;
                padding: 8px;
                border-bottom: 1px solid #cbd5e1;
                text-align: center;
                min-height: 50px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 14px;
                color: #0f172a;
            }

            .image-box {
                flex-grow: 1;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 5px;
                overflow: hidden;
            }

            .defect-img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain;
            }

            .page-footer {
                margin-top: 10px;
                border-top: 2px solid #0f172a;
                padding-top: 8px;
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: #64748b;
            }
        }

        .pwa-app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; }
    </style>
</head>
<body>
    <div class="pwa-app shadow-2xl no-print">
        <header class="bg-[#0f172a] text-white p-6 rounded-b-[2rem] shadow-xl">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Inspection Pro</h1>
                <button onclick="resetApp()" class="p-2 bg-rose-500/20 text-rose-500 rounded-full hover:bg-rose-500 hover:text-white transition-all">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" id="projName" placeholder="ระบุชื่อโครงการ" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none">
                <input type="text" id="inspectorName" placeholder="ระบุชื่อผู้ตรวจสอบ" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none">
            </div>
        </header>

        <main class="p-6 pb-32">
            <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-8">
                <input type="text" id="defectTitle" placeholder="รายละเอียดความเสียหาย..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl mb-4 outline-none">
                
                <div id="previewContainer" class="hidden mb-4 relative rounded-2xl overflow-hidden border">
                    <img id="imgPreview" class="w-full h-auto">
                    <button onclick="clearImage()" class="absolute top-2 right-2 bg-black/50 text-white w-8 h-8 rounded-full">✕</button>
                </div>

                <button onclick="document.getElementById('cameraInput').click()" class="w-full bg-slate-800 text-white font-bold py-4 rounded-2xl mb-3">📸 ถ่ายรูปหน้างาน</button>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                <button onclick="addListItem()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">เพิ่มลงในรายงาน</button>
            </div>
            <div id="displayList" class="space-y-4"></div>
        </main>

        <div id="actionArea" class="hidden fixed bottom-8 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">
            <button onclick="exportToPDF()" class="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-bold shadow-2xl">📄 ออกรายงาน PDF Professional</button>
        </div>
    </div>

    <div id="pdf-content" class="hidden"></div>

    <script>
        let defectData = [];

        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const scale = 1000 / img.width;
                        canvas.width = 1000;
                        canvas.height = img.height * scale;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        document.getElementById('imgPreview').src = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById('previewContainer').classList.remove('hidden');
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        function clearImage() {
            document.getElementById('cameraInput').value = '';
            document.getElementById('previewContainer').classList.add('hidden');
        }

        function addListItem() {
            const title = document.getElementById('defectTitle').value;
            const img = document.getElementById('imgPreview').src;
            if(!title || !img) return alert("กรุณาใส่ข้อมูลให้ครบ");
            defectData.push({ title, img });
            renderUI();
            document.getElementById('defectTitle').value = '';
            clearImage();
        }

        function renderUI() {
            const list = document.getElementById('displayList');
            list.innerHTML = '';
            defectData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl flex items-center gap-4 border shadow-sm";
                div.innerHTML = `<img src="${item.img}" class="w-16 h-16 object-cover rounded-lg">
                                 <div class="flex-1 font-bold text-slate-700">${index+1}. ${item.title}</div>
                                 <button onclick="deleteItem(${index})" class="text-rose-500 p-2">✕</button>`;
                list.appendChild(div);
            });
            document.getElementById('actionArea').classList.toggle('hidden', defectData.length === 0);
        }

        function deleteItem(i) { defectData.splice(i,1); renderUI(); }
        
        function resetApp() { 
            if(confirm("ล้างข้อมูลทั้งหมด?")) { 
                defectData = []; 
                document.getElementById('projName').value = '';
                document.getElementById('inspectorName').value = '';
                renderUI(); 
            } 
        }

        function exportToPDF() {
            const container = document.getElementById('pdf-content');
            container.innerHTML = '';
            
            const proj = document.getElementById('projName').value || "-";
            const inspector = document.getElementById('inspectorName').value || "-";
            const dateStr = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric' });
            
            const totalPages = Math.ceil(defectData.length / 4);

            for(let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = "print-page";
                
                pageDiv.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 4px solid #0f172a; padding-bottom: 10px;">
                        <div>
                            <h1 style="margin: 0; font-size: 28px; color: #0f172a; font-weight: 800;">INSPECTION REPORT</h1>
                            <p style="margin: 5px 0; color: #334155; font-size: 14px;">โครงการ: <b>${proj}</b></p>
                        </div>
                        <div style="text-align: right; font-size: 13px; color: #334155;">
                            <p style="margin: 0;">วันที่ตรวจสอบ: <b>${dateStr}</b></p>
                            <p style="margin: 3px 0;">ผู้ตรวจสอบ: <b>${inspector}</b></p>
                            <p style="margin: 3px 0; color: #94a3b8;">หน้า ${p+1} / ${totalPages}</p>
                        </div>
                    </div>

                    <div class="grid-container">
                        ${defectData.slice(p * 4, (p * 4) + 4).map((item, i) => `
                            <div class="defect-card">
                                <div class="defect-info">รายการที่ ${(p * 4) + i + 1}: ${item.title}</div>
                                <div class="image-box">
                                    <img src="${item.img}" class="defect-img">
                                </div>
                            </div>
                        `).join('')}
                    </div>

                    <div class="page-footer">
                        <span>Generated by Inspection Pro Enterprise Edition</span>
                        <div style="display: flex; gap: 30px;">
                            <div style="text-align: center;">_______________________<br>ลงชื่อผู้ตรวจสอบ</div>
                            <div style="text-align: center;">_______________________<br>ลงชื่อผู้รับงาน</div>
                        </div>
                    </div>
                `;
                container.appendChild(pageDiv);
            }
            window.print();
        }
    </script>
</body>
</html>
