<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Pro V5.2 + Report V5.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        
        /* สไตล์หน้าหลักอ้างอิง V5.2 */
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .pwa-app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; padding-bottom: 100px; }

        /* สไตล์การออกรายงานอ้างอิง V5.7 */
        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #pdf-content { display: block !important; }
            
            @page { 
                size: A4; 
                margin: 10mm 15mm; 
            }
            
            .print-page {
                display: block;
                width: 100%;
                page-break-after: always;
                position: relative;
                box-sizing: border-box;
                min-height: auto;
            }

            .print-page:last-child {
                page-break-after: auto !important;
            }

            .grid-layout {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15pt;
                margin-top: 10px;
            }

            .defect-card {
                border: 1.5pt solid #0f172a;
                display: flex;
                flex-direction: column;
                background: #fff;
                break-inside: avoid;
            }

            .card-header {
                background-color: #0f172a !important;
                color: white !important;
                -webkit-print-color-adjust: exact;
                padding: 6pt;
                text-align: center;
                font-weight: bold;
                font-size: 12pt;
            }

            .img-container {
                height: 75mm; 
                width: 100%;
                background: #f8fafc;
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .defect-img {
                max-width: 100%;
                max-height: 100%;
                object-fit: contain; /* แสดงภาพเต็มใบตาม V5.7 */
            }

            .card-body {
                padding: 10pt;
                text-align: center;
                font-size: 12pt;
                border-top: 1.5pt solid #0f172a;
                min-height: 40pt;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .sig-area {
                margin-top: 30px;
                display: flex;
                justify-content: space-around;
                padding: 20pt 0;
                border-top: 1pt solid #cbd5e1;
            }
        }
    </style>
</head>
<body>

    <div class="pwa-app shadow-2xl no-print">
        <header class="bg-[#0f172a] text-white p-6 rounded-b-[2rem] shadow-xl">
            <h1 class="text-2xl font-bold mb-4">Inspection Pro</h1>
            <div class="space-y-3">
                <input type="text" id="projName" placeholder="ชื่อโครงการ" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none">
                <input type="text" id="inspectorName" placeholder="ชื่อผู้ตรวจสอบ" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none">
            </div>
        </header>

        <main class="p-6">
            <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                <textarea id="defectTitle" placeholder="รายละเอียดความเสียหาย..." class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none resize-none"></textarea>
                
                <div id="previewContainer" class="hidden mb-4 relative rounded-xl overflow-hidden border">
                    <img id="imgPreview" class="w-full h-auto">
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('cameraInput').click()" class="bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
                        📸 ถ่ายรูป
                    </button>
                    <button onclick="addListItem()" class="bg-indigo-600 text-white font-bold py-4 rounded-2xl">
                        เพิ่มรายการ
                    </button>
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
            </div>

            <div id="displayList" class="space-y-4">
                </div>
        </main>

        <div id="actionArea" class="hidden fixed bottom-8 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">
            <button onclick="exportToPDF()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold shadow-2xl flex items-center justify-center gap-3">
                📄 ออกรายงาน PDF (ระบบ V5.7)
            </button>
        </div>
    </div>

    <div id="pdf-content" class="hidden"></div>

    <script>
        let defectData = [];

        // ระบบจัดการรูปภาพ (Image Handler)
        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const MAX_WIDTH = 1200;
                        const scale = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        
                        document.getElementById('imgPreview').src = canvas.toDataURL('image/jpeg', 0.8);
                        document.getElementById('previewContainer').classList.remove('hidden');
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        // ระบบเพิ่มรายการ (Logic V5.2)
        function addListItem() {
            const title = document.getElementById('defectTitle').value;
            const img = document.getElementById('imgPreview').src;
            
            if(!title || !img || img.includes('data:image/png;base64')) {
                return alert("กรุณาถ่ายรูปและกรอกรายละเอียดให้ครบถ้วน");
            }
            
            defectData.push({ title, img });
            renderUI();
            
            // ล้างข้อมูลหลังเพิ่ม
            document.getElementById('defectTitle').value = '';
            document.getElementById('previewContainer').classList.add('hidden');
            document.getElementById('imgPreview').src = '';
        }

        function renderUI() {
            const list = document.getElementById('displayList');
            list.innerHTML = '';
            defectData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl flex items-center gap-4 border shadow-sm border-slate-100";
                div.innerHTML = `
                    <img src="${item.img}" class="w-16 h-16 object-cover rounded-lg">
                    <div class="flex-1 font-bold text-slate-700">${index+1}. ${item.title}</div>
                    <button onclick="deleteItem(${index})" class="text-rose-500 p-2">✕</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('actionArea').classList.toggle('hidden', defectData.length === 0);
        }

        function deleteItem(i) {
            defectData.splice(i, 1);
            renderUI();
        }

        // ระบบออกรายงาน (Report Engine V5.7)
        function exportToPDF() {
            const container = document.getElementById('pdf-content');
            container.innerHTML = '';
            const totalPages = Math.ceil(defectData.length / 4);

            for(let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = "print-page";
                pageDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; border-bottom:3pt solid #0f172a; padding-bottom:10px; margin-bottom:20px;">
                        <div>
                            <h2 style="margin:0; font-size:20pt; color:#0f172a; font-weight:800;">INSPECTION REPORT</h2>
                            <p style="margin:2pt 0;">โครงการ: <b>${document.getElementById('projName').value || '-'}</b></p>
                        </div>
                        <div style="text-align:right;">
                            <p style="margin:0;">ผู้ตรวจสอบ: <b>${document.getElementById('inspectorName').value || '-'}</b></p>
                            <p style="margin:0; color:#64748b; font-weight:bold;">หน้า ${p+1} / ${totalPages}</p>
                        </div>
                    </div>
                    <div class="grid-layout">
                        ${defectData.slice(p * 4, p * 4 + 4).map((item, i) => `
                            <div class="defect-card">
                                <div class="card-header">รายการที่ ${(p*4)+i+1}</div>
                                <div class="img-container"><img src="${item.img}" class="defect-img"></div>
                                <div class="card-body"><b>${item.title}</b></div>
                            </div>
                        `).join('')}
                    </div>
                    ${p === totalPages - 1 ? `
                        <div class="sig-area">
                            <div style="text-align:center;">______________________<br>ลงชื่อผู้ตรวจสอบ</div>
                            <div style="text-align:center;">______________________<br>ลงชื่อผู้รับงาน</div>
                        </div>
                    ` : ''}
                `;
                container.appendChild(pageDiv);
            }
            window.print();
        }
    </script>
</body>
</html>
