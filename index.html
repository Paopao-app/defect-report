<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Pro Ultimate Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; margin: 0; }
        .pwa-app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; padding-bottom: 120px; }
        
        /* Editor Styles */
        #editorCanvas { border: 2px solid #0f172a; max-width: 100%; cursor: crosshair; touch-action: none; background: #000; border-radius: 12px; }
        .tool-btn { padding: 8px 10px; border-radius: 8px; border: 1px solid #e2e8f0; background: white; font-size: 12px; font-weight: 600; }
        .tool-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; }

        @media print {
            .no-print { display: none !important; }
            #pdf-content { display: block !important; }
            @page { size: A4; margin: 10mm 15mm; }
            .print-page { display: block; width: 100%; page-break-after: always; min-height: auto; }
            .print-page:last-child { page-break-after: auto !important; }
            .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15pt; margin-top: 10px; }
            .defect-card { border: 1.5pt solid #0f172a; display: flex; flex-direction: column; background: #fff; break-inside: avoid; }
            .card-header { background-color: #0f172a !important; color: white !important; padding: 6pt; text-align: center; font-weight: bold; font-size: 11pt; -webkit-print-color-adjust: exact; }
            .img-container { height: 75mm; width: 100%; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
            .defect-img { max-width: 100%; max-height: 100%; object-fit: contain; }
            .card-body { padding: 8pt; text-align: center; font-size: 11pt; border-top: 1.5pt solid #0f172a; min-height: 40pt; display: flex; align-items: center; justify-content: center; }
            .sig-area { margin-top: 30px; display: flex; justify-content: space-around; padding: 20pt 0; border-top: 1pt solid #cbd5e1; }
        }
    </style>
</head>
<body>

    <div class="pwa-app shadow-2xl no-print">
        <header class="bg-[#0f172a] text-white p-5 rounded-b-[2rem] shadow-xl">
            <div class="flex justify-between items-center mb-4">
                <h1 class="text-xl font-bold italic tracking-tight">Inspection Pro Update</h1>
                <button onclick="resetApp()" class="bg-rose-500 text-xs px-3 py-1 rounded-lg font-bold">ล้างสถานะ</button>
            </div>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="projName" placeholder="ชื่อโครงการ" class="bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                    <input type="text" id="inspectorName" placeholder="ผู้ตรวจสอบ" class="bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="roomNum" placeholder="ห้อง" class="bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                    <input type="text" id="floorNum" placeholder="ชั้น" class="bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                    <input type="text" id="areaName" placeholder="ส่วนกลาง" class="bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                </div>

                <select id="workType" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-sm text-white outline-none">
                    <option value="" class="text-slate-900">-- เลือกประเภทงาน --</option>
                    <option class="text-slate-900">ตรวจ SLEEVE พื้นห้องน้ำ,ระเบียง</option>
                    <option class="text-slate-900">ตรวจ OUTLET ผนังห้องน้ำ,ระเบียง</option>
                    <option class="text-slate-900">ตรวจ OUTLET ภายในห้องก่อนฉาบ</option>
                    <option class="text-slate-900">ตรวจตำแหน่ง SPRINKLER</option>
                    <option class="text-slate-900">ตรวจตำแหน่ง FCU</option>
                    <option class="text-slate-900">ตรวจติดตั้ง CDU</option>
                    <option class="text-slate-900">ตรวจติดตั้งสุขภัณฑ์</option>
                    <option class="text-slate-900">ตรวจระบบเหนือฝ้า</option>
                    <option class="text-slate-900">ตรวจวัดค่าลม EXHAUST</option>
                    <option class="text-slate-900">ตรวจงานทดสอบวงจรไฟฟ้า</option>
                    <option class="text-slate-900">ตรวจงานทดสอบแรงดันท่อดับเพลิง</option>
                    <option class="text-slate-900">ตรวจงานทดสอบแรงดันท่อเครื่องปรับอากาศ</option>
                    <option class="text-slate-900">ตรวจสอบ GRAVITY S,W,V,KW,RL</option>
                    <option class="text-slate-900">ตรวจสอบ SLOPE ท่อน้ำทิ้งแอร์</option>
                    <option class="text-slate-900">ตรวจงานทดสอบสายเมนไฟฟ้า</option>
                    <option class="text-slate-900">ลิฟต์</option>
                </select>
            </div>
        </header>

        <main class="p-4">
            <div id="editorArea" class="hidden mb-6 bg-slate-100 p-3 rounded-2xl border-2 border-slate-200">
                <div class="grid grid-cols-4 gap-1 mb-3">
                    <button onclick="setTool('pen')" id="btn-pen" class="tool-btn">✏️ วาด</button>
                    <button onclick="setTool('circle')" id="btn-circle" class="tool-btn">⭕ วง</button>
                    <button onclick="setTool('rect')" id="btn-rect" class="tool-btn">⬜ เหลี่ยม</button>
                    <button onclick="setTool('arrow')" id="btn-arrow" class="tool-btn">⬆️ ชี้</button>
                    <button onclick="setTool('eraser')" id="btn-eraser" class="tool-btn bg-yellow-50">🧽 ยางลบ</button>
                    <button onclick="undo()" class="tool-btn">↩️ ย้อน</button>
                    <button onclick="stampIcon('PASS')" class="tool-btn bg-green-500 text-white border-none">✅ ผ่าน</button>
                    <button onclick="stampIcon('FAIL')" class="tool-btn bg-red-500 text-white border-none">❌ ไม่ผ่าน</button>
                </div>
                <canvas id="editorCanvas"></canvas>
            </div>

            <div class="bg-white rounded-3xl p-4 border border-slate-200 shadow-sm mb-6">
                <textarea id="defectTitle" placeholder="ระบุรายละเอียด..." class="w-full p-3 bg-slate-50 border rounded-xl mb-4 outline-none resize-none text-sm h-20"></textarea>
                
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="triggerInput('camera')" class="bg-slate-800 text-white font-bold py-3 rounded-xl text-sm">📸 กล้อง</button>
                    <button onclick="triggerInput('file')" class="bg-slate-600 text-white font-bold py-3 rounded-xl text-sm">📁 เลือกไฟล์</button>
                </div>
                <button onclick="addListItem()" class="w-full mt-2 bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg">เพิ่มรายการเข้า Report</button>
                
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                <input type="file" id="fileInput" accept="image/*" class="hidden">
            </div>

            <div id="displayList" class="space-y-3"></div>
        </main>

        <div id="actionArea" class="hidden fixed bottom-6 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">
            <button onclick="exportToPDF()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold shadow-2xl flex items-center justify-center gap-2">
                📄 ออกรายงาน PDF (V5.7 System)
            </button>
        </div>
    </div>

    <div id="pdf-content" class="hidden"></div>

    <script>
        let defectData = [];
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        let currentTool = 'pen';
        let isDrawing = false;
        let startX, startY;
        let originalImage = null;
        let history = []; // สำหรับ Undo

        function triggerInput(type) {
            if(type === 'camera') document.getElementById('cameraInput').click();
            else document.getElementById('fileInput').click();
        }

        const handleImage = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        const aspect = img.height / img.width;
                        canvas.width = 1000;
                        canvas.height = 1000 * aspect;
                        saveState();
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        document.getElementById('editorArea').classList.remove('hidden');
                        document.getElementById('editorArea').scrollIntoView({ behavior: 'smooth' });
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        document.getElementById('cameraInput').onchange = handleImage;
        document.getElementById('fileInput').onchange = handleImage;

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tool)?.classList.add('active');
        }

        function saveState() {
            if (history.length > 10) history.shift();
            history.push(canvas.toDataURL());
        }

        function undo() {
            if (history.length > 0) {
                let img = new Image();
                img.src = history.pop();
                img.onload = () => {
                    ctx.clearRect(0,0,canvas.width, canvas.height);
                    ctx.drawImage(img, 0, 0);
                };
            }
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - rect.left) * scaleX, y: (cy - rect.top) * scaleY };
        }

        canvas.addEventListener('mousedown', (e) => { isDrawing = true; const p = getPos(e); startX = p.x; startY = p.y; saveState(); if(currentTool === 'pen' || currentTool === 'eraser') ctx.beginPath(); });
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            if(currentTool === 'pen' || currentTool === 'eraser') {
                ctx.strokeStyle = currentTool === 'eraser' ? 'white' : 'red';
                ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
                ctx.lineWidth = currentTool === 'eraser' ? 20 : 6;
                ctx.lineTo(p.x, p.y);
                ctx.stroke();
            }
        });
        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            const p = getPos(e);
            ctx.globalCompositeOperation = 'source-over';
            ctx.strokeStyle = "red"; ctx.lineWidth = 6;
            if (currentTool === 'circle') {
                const r = Math.sqrt(Math.pow(p.x - startX, 2) + Math.pow(p.y - startY, 2));
                ctx.beginPath(); ctx.arc(startX, startY, r, 0, 2 * Math.PI); ctx.stroke();
            } else if (currentTool === 'rect') {
                ctx.strokeRect(startX, startY, p.x - startX, p.y - startY);
            } else if (currentTool === 'arrow') {
                drawArrow(startX, startY, p.x, p.y);
            }
            isDrawing = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousedown', {clientX: e.touches[0].clientX, clientY: e.touches[0].clientY})); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); canvas.dispatchEvent(new MouseEvent('mousemove', {clientX: e.touches[0].clientX, clientY: e.touches[0].clientY})); });
        canvas.addEventListener('touchend', (e) => { canvas.dispatchEvent(new MouseEvent('mouseup', {})); });

        function drawArrow(x1, y1, x2, y2) {
            const headlen = 30;
            const angle = Math.atan2(y2-y1, x2-x1);
            ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x2, y2);
            ctx.lineTo(x2-headlen*Math.cos(angle-Math.PI/6), y2-headlen*Math.sin(angle-Math.PI/6));
            ctx.lineTo(x2-headlen*Math.cos(angle+Math.PI/6), y2-headlen*Math.sin(angle+Math.PI/6));
            ctx.fillStyle = "red"; ctx.fill();
        }

        function stampIcon(type) {
            saveState();
            ctx.font = "bold 60px Sarabun"; ctx.textAlign = "center";
            ctx.fillStyle = type === 'PASS' ? "#22c55e" : "#ef4444";
            ctx.fillText(type === 'PASS' ? "✅ PASS / ผ่าน" : "❌ FAIL / ไม่ผ่าน", canvas.width/2, canvas.height - 60);
        }

        function addListItem() {
            const title = document.getElementById('defectTitle').value;
            if(!title || !originalImage) return alert("กรุณาเลือกรูปและพิมพ์รายละเอียด");
            
            // บีบอัดรูปภาพลง 30% (Quality 0.5 จากเดิม 0.8)
            const img = canvas.toDataURL('image/jpeg', 0.5); 
            defectData.push({ title, img });
            renderUI();
            document.getElementById('defectTitle').value = '';
            document.getElementById('editorArea').classList.add('hidden');
            originalImage = null; history = [];
        }

        function renderUI() {
            const list = document.getElementById('displayList');
            list.innerHTML = '';
            defectData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-3 rounded-xl flex items-center gap-3 border shadow-sm";
                div.innerHTML = `<img src="${item.img}" class="w-16 h-16 object-cover rounded-lg border"><div class="flex-1 font-bold text-slate-700 text-sm">${index+1}. ${item.title}</div><button onclick="deleteItem(${index})" class="text-rose-500 font-bold p-2 text-xl">✕</button>`;
                list.appendChild(div);
            });
            document.getElementById('actionArea').classList.toggle('hidden', defectData.length === 0);
        }

        function deleteItem(i) { defectData.splice(i, 1); renderUI(); }
        function resetApp() { if(confirm("ล้างข้อมูลทั้งหมด?")) location.reload(); }

        function exportToPDF() {
            const container = document.getElementById('pdf-content');
            container.innerHTML = '';
            const totalPages = Math.ceil(defectData.length / 4);
            const today = new Date().toLocaleDateString('th-TH');

            for(let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = "print-page";
                pageDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; border-bottom:2.5pt solid #0f172a; padding-bottom:10px; margin-bottom:15px;">
                        <div style="width: 70%;">
                            <h2 style="margin:0; font-size:18pt; color:#0f172a; font-weight:800;">INSPECTION REPORT</h2>
                            <p style="margin:4pt 0; font-size:10pt; line-height:1.4;">
                                <b>ประเภท:</b> ${document.getElementById('workType').value || '-'}<br>
                                <b>ตำแหน่ง:</b> ห้อง ${document.getElementById('roomNum').value || '-'} ชั้น ${document.getElementById('floorNum').value || '-'} (${document.getElementById('areaName').value || '-'})
                            </p>
                        </div>
                        <div style="text-align:right;">
                            <p style="margin:0; font-size:9pt;">โครงการ: ${document.getElementById('projName').value || '-'}</p>
                            <p style="margin:0; font-size:9pt;">ผู้ตรวจ: ${document.getElementById('inspectorName').value || '-'}</p>
                            <p style="margin:5px 0 0 0; color:#0f172a; font-weight:800; font-size:12pt;">หน้า ${p+1} / ${totalPages}</p>
                        </div>
                    </div>
                    <div class="grid-layout">
                        ${defectData.slice(p * 4, p * 4 + 4).map((item, i) => `
                            <div class="defect-card">
                                <div class="card-header">รายการที่ ${(p*4)+i+1}</div>
                                <div class="img-container"><img src="${item.img}" class="defect-img"></div>
                                <div class="card-body"><b>${item.title}</b></div>
                            </div>
                        `).join('')}
                    </div>
                    ${p === totalPages - 1 ? `
                        <div class="sig-area">
                            <div style="text-align:center; font-size:10pt;">______________________<br>ลงชื่อผู้ตรวจสอบ</div>
                            <div style="text-align:center; font-size:10pt;">______________________<br>ลงชื่อผู้รับงาน</div>
                        </div>
                    ` : ''}
                `;
                container.appendChild(pageDiv);
            }
            window.print();
        }
    </script>
</body>
</html>
