<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Defect Report</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .pwa-frame { max-width: 500px; margin: 0 auto; min-height: 100vh; background: #f9fafb; }
    </style>
</head>
<body class="bg-gray-200">
    <div class="pwa-frame shadow-xl">
        <nav class="bg-slate-800 text-white p-5 sticky top-0 flex justify-between items-center">
            <h1 class="text-lg font-bold">ตรวจงาน Defect</h1>
            <span id="itemCount" class="bg-red-500 text-white text-xs px-2 py-1 rounded-full">0 รายการ</span>
        </nav>

        <div class="p-4">
            <!-- ส่วนเพิ่มรายการ -->
            <div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100 mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">ชื่อรายการ / จุดที่พบ</label>
                <input type="text" id="defectTitle" placeholder="เช่น กระเบื้องร้าว ห้องน้ำชั้น 2" class="w-full p-4 bg-gray-50 border-0 rounded-xl mb-4 focus:ring-2 focus:ring-blue-500">
                
                <label class="block text-sm font-medium text-gray-700 mb-2">รูปภาพประกอบ</label>
                <input type="file" id="imageInput" accept="image/*" capture="environment" class="hidden">
                <button onclick="document.getElementById('imageInput').click()" class="w-full py-4 border-2 border-dashed border-gray-300 rounded-xl flex flex-col items-center justify-center text-gray-500 hover:bg-gray-50 mb-4">
                    <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                    <span>เปิดกล้องถ่ายรูป</span>
                </button>

                <button onclick="addDefect()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold shadow-lg shadow-blue-200 active:scale-95 transition">
                    + เพิ่มเข้าไปในรายการ
                </button>
            </div>

            <!-- รายการที่แสดง -->
            <div id="list" class="space-y-3"></div>

            <!-- ปุ่ม PDF -->
            <button id="pdfBtn" onclick="generatePDF()" class="hidden w-full mt-10 bg-green-600 text-white py-4 rounded-xl font-bold flex justify-center items-center gap-2 mb-20">
                ดาวน์โหลดรายงาน PDF
            </button>
        </div>
    </div>

    <script>
        let defects = [];
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }

        function addDefect() {
            const title = document.getElementById('defectTitle').value;
            const file = document.getElementById('imageInput').files[0];
            if(!title || !file) return alert("กรุณากรอกชื่อและถ่ายรูป");

            const reader = new FileReader();
            reader.onload = (e) => {
                defects.push({ title, img: e.target.result });
                updateUI();
                document.getElementById('defectTitle').value = '';
                document.getElementById('imageInput').value = '';
            };
            reader.readAsDataURL(file);
        }

        function updateUI() {
            const list = document.getElementById('list');
            list.innerHTML = '';
            defects.forEach((item, i) => {
                list.innerHTML += `
                    <div class="bg-white p-3 rounded-xl flex items-center gap-3 shadow-sm border border-gray-100">
                        <img src="${item.img}" class="w-16 h-16 object-cover rounded-lg">
                        <div class="flex-1 font-medium text-gray-800">${i+1}. ${item.title}</div>
                        <button onclick="defects.splice(${i},1);updateUI();" class="text-red-400 p-2">ลบ</button>
                    </div>`;
            });
            document.getElementById('itemCount').innerText = defects.length + ' รายการ';
            document.getElementById('pdfBtn').classList.toggle('hidden', defects.length === 0);
        }

        async function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Defect Report", 20, 20);
            let y = 30;
            defects.forEach((d, i) => {
                if(y > 250) { doc.addPage(); y = 20; }
                doc.text(`${i+1}. ${d.title}`, 20, y);
                doc.addImage(d.img, 'JPEG', 20, y+5, 40, 40);
                y += 50;
            });
            doc.save("defect-report.pdf");
        }
    </script>
</body>
</html>
