<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Inspection Pro V5</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');

body{
    font-family:'Sarabun',sans-serif;
    background:#f8fafc;
    -webkit-tap-highlight-color:transparent;
}

.pwa-app{
    max-width:500px;
    margin:auto;
    min-height:100vh;
    background:white;
    display:flex;
    flex-direction:column;
    position:relative;
}

input,button{
    outline:none !important;
}

#pdf-render-area{
    position:absolute;
    left:-99999px;
    top:0;
    width:800px;
    padding:40px;
    background:white;
    color:black;
}

tr{
    page-break-inside:avoid;
}

img{
    page-break-inside:avoid;
}

.loading{
    opacity:0.6;
    pointer-events:none;
}

.fade-in{
    animation:fade .3s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body>

<div class="pwa-app shadow-xl">

<header class="bg-indigo-950 text-white p-6 rounded-b-[2.5rem] shadow-lg">

<div class="flex justify-between items-start mb-6">

<div>
<h1 class="text-2xl font-bold tracking-tight">
Inspection Pro
</h1>

<p class="text-indigo-300 text-xs">
ระบบจัดการรายงานความเสียหาย V5.0
</p>
</div>

<button onclick="resetApp()"
class="p-2 bg-indigo-900/50 rounded-full">

🔄

</button>

</div>

<div class="space-y-3">

<input
type="text"
id="projName"
placeholder="ระบุชื่อโครงการ"
class="w-full bg-indigo-900/40 border border-indigo-800/50 rounded-2xl p-3.5 text-sm text-white placeholder-indigo-400">

<input
type="text"
id="inspectorName"
placeholder="ชื่อผู้ตรวจสอบ"
class="w-full bg-indigo-900/40 border border-indigo-800/50 rounded-2xl p-3.5 text-sm text-white placeholder-indigo-400">

</div>

</header>

<main class="p-6 flex-1">

<div class="bg-white rounded-3xl p-5 mb-8 border border-slate-100 shadow-sm">

<h3 class="text-xs font-bold text-slate-400 mb-4 uppercase tracking-widest">
เพิ่มรายการใหม่
</h3>

<input
type="text"
id="defectTitle"
placeholder="รายละเอียดความเสียหาย"
class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-4">

<div id="previewContainer"
class="hidden mb-4 relative">

<img id="imgPreview"
class="w-full h-52 object-cover rounded-2xl shadow-md border border-slate-100">

<button
onclick="clearImage()"
class="absolute -top-2 -right-2 bg-rose-500 text-white w-8 h-8 rounded-full">

✕

</button>

</div>

<div class="flex gap-3">

<button
onclick="openCamera()"
class="flex-1 bg-indigo-50 text-indigo-700 font-bold py-4 rounded-2xl border border-indigo-100">

📸 ถ่ายรูป

</button>

<input
type="file"
id="cameraInput"
accept="image/*"
capture
class="hidden">

<button
onclick="addListItem()"
class="flex-[1.5] bg-indigo-600 text-white font-bold py-4 rounded-2xl">

เพิ่มลงรายการ

</button>

</div>

</div>

<div class="flex items-center justify-between mb-4">

<h2 class="font-bold text-slate-800">

รายการที่พบ
(<span id="itemCount">0</span>)

</h2>

</div>

<div id="displayList"
class="space-y-4 pb-32"></div>

</main>

<div id="actionArea"
class="hidden fixed bottom-8 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">

<button
onclick="exportToPDF()"
id="btnPdf"
class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold shadow-2xl">

📄 ออกรายงาน PDF

</button>

</div>

</div>

<div id="pdf-render-area">

<div style="border-bottom:6px solid #1e1b4b;padding-bottom:25px;display:flex;justify-content:space-between;align-items:flex-end;">

<div>

<h1 style="font-size:32px;color:#1e1b4b;margin:0;font-weight:700;">
INSPECTION REPORT
</h1>

<p id="pdf_project_text"
style="font-size:18px;color:#475569;margin:8px 0 0 0;">
</p>

</div>

<div style="text-align:right;color:#475569;">

<p id="pdf_date_text"
style="font-weight:700;margin:0;">
</p>

<p id="pdf_inspector_text"
style="margin:5px 0 0 0;">
</p>

</div>

</div>

<table
style="width:100%;margin-top:35px;border-collapse:collapse;">

<thead>

<tr style="background:#1e1b4b;color:white;">

<th style="padding:15px;border:1px solid #e2e8f0;width:60px;">
#
</th>

<th style="padding:15px;border:1px solid #e2e8f0;text-align:left;">
รายละเอียด
</th>

<th style="padding:15px;border:1px solid #e2e8f0;width:380px;">
รูปภาพ
</th>

</tr>

</thead>

<tbody id="pdf_table_body"></tbody>

</table>

</div>

<script>

let defectData = [];

function saveData(){
    localStorage.setItem(
        'defectData',
        JSON.stringify(defectData)
    );
}

function loadData(){

    const saved = localStorage.getItem('defectData');

    if(saved){

        defectData = JSON.parse(saved);

        renderUI();
    }
}

window.onload = loadData;

function openCamera(){
    document.getElementById('cameraInput').click();
}

function compressImage(file){

    return new Promise((resolve)=>{

        const reader = new FileReader();

        reader.onload = function(e){

            const img = new Image();

            img.onload = function(){

                const canvas =
                document.createElement('canvas');

                const MAX_WIDTH = 1280;

                let width = img.width;
                let height = img.height;

                if(width > MAX_WIDTH){

                    height *= MAX_WIDTH / width;
                    width = MAX_WIDTH;
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');

                ctx.drawImage(img,0,0,width,height);

                const compressed =
                canvas.toDataURL(
                    'image/jpeg',
                    0.7
                );

                resolve(compressed);
            };

            img.src = e.target.result;
        };

        reader.readAsDataURL(file);
    });
}

document.getElementById('cameraInput').onchange =
async function(e){

    const file = e.target.files[0];

    if(!file) return;

    const compressed =
    await compressImage(file);

    document.getElementById('imgPreview').src =
    compressed;

    document.getElementById('previewContainer')
    .classList.remove('hidden');
};

function clearImage(){

    document.getElementById('cameraInput').value='';

    const img =
    document.getElementById('imgPreview');

    img.src='';

    document.getElementById('previewContainer')
    .classList.add('hidden');
}

function addListItem(){

    const title =
    document.getElementById('defectTitle')
    .value.trim();

    const img =
    document.getElementById('imgPreview').src;

    if(!title || !img){

        alert('กรุณากรอกข้อมูลและถ่ายรูป');

        return;
    }

    defectData.push({
        title,
        img
    });

    saveData();

    renderUI();

    document.getElementById('defectTitle')
    .value='';

    clearImage();
}

function renderUI(){

    const list =
    document.getElementById('displayList');

    const count =
    document.getElementById('itemCount');

    const action =
    document.getElementById('actionArea');

    list.innerHTML='';

    if(defectData.length>0){

        action.classList.remove('hidden');

        defectData.forEach((item,index)=>{

            const itemDiv =
            document.createElement('div');

            itemDiv.className =
            "bg-white p-4 rounded-2xl flex items-center gap-4 border border-slate-100 shadow-sm fade-in";

            const img =
            document.createElement('img');

            img.src = item.img;

            img.className =
            "w-16 h-16 object-cover rounded-xl border";

            const title =
            document.createElement('div');

            title.className =
            "flex-1 font-bold text-slate-700 text-sm";

            title.innerText =
            `${index+1}. ${item.title}`;

            const del =
            document.createElement('button');

            del.className =
            "text-rose-500 font-bold";

            del.innerText = '✕';

            del.onclick = ()=>deleteItem(index);

            itemDiv.appendChild(img);
            itemDiv.appendChild(title);
            itemDiv.appendChild(del);

            list.appendChild(itemDiv);
        });

    }else{

        action.classList.add('hidden');
    }

    count.innerText = defectData.length;
}

function deleteItem(index){

    if(!confirm('ลบรายการนี้ ?')) return;

    defectData.splice(index,1);

    saveData();

    renderUI();
}

function resetApp(){

    if(!confirm('ล้างข้อมูลทั้งหมด ?'))
    return;

    defectData=[];

    localStorage.removeItem('defectData');

    document.getElementById('projName').value='';

    document.getElementById('inspectorName').value='';

    clearImage();

    renderUI();
}

async function exportToPDF(){

    if(defectData.length===0){

        alert('ไม่มีข้อมูล');

        return;
    }

    const btn =
    document.getElementById('btnPdf');

    btn.disabled = true;

    btn.classList.add('loading');

    btn.innerHTML =
    '⏳ กำลังสร้าง PDF...';

    document.getElementById('pdf_project_text')
    .innerText =
    'โครงการ: ' +
    (
        document.getElementById('projName')
        .value || '-'
    );

    document.getElementById('pdf_inspector_text')
    .innerText =
    'ผู้ตรวจสอบ: ' +
    (
        document.getElementById('inspectorName')
        .value || '-'
    );

    document.getElementById('pdf_date_text')
    .innerText =
    'วันที่: ' +
    new Date().toLocaleDateString('th-TH');

    const tableBody =
    document.getElementById('pdf_table_body');

    tableBody.innerHTML='';

    const promises = defectData.map((item,index)=>{

        return new Promise((resolve)=>{

            const tr =
            document.createElement('tr');

            tr.innerHTML = `
            <td style="padding:15px;border:1px solid #e2e8f0;text-align:center;vertical-align:top;">
            ${index+1}
            </td>

            <td style="padding:15px;border:1px solid #e2e8f0;vertical-align:top;font-weight:bold;">
            ${item.title}
            </td>

            <td style="padding:15px;border:1px solid #e2e8f0;text-align:center;">
            <img
            src="${item.img}"
            style="width:320px;border-radius:8px;">
            </td>
            `;

            tableBody.appendChild(tr);

            const img = tr.querySelector('img');

            if(img.complete){

                resolve();

            }else{

                img.onload = resolve;
            }
        });
    });

    await Promise.all(promises);

    const element =
    document.getElementById('pdf-render-area');

    const opt = {

        margin:10,

        filename:
        `Inspection_Report_${Date.now()}.pdf`,

        image:{
            type:'jpeg',
            quality:0.98
        },

        html2canvas:{
            scale:2,
            useCORS:true,
            logging:false
        },

        jsPDF:{
            unit:'mm',
            format:'a4',
            orientation:'portrait'
        }
    };

    try{

        await html2pdf()
        .set(opt)
        .from(element)
        .save();

    }catch(err){

        console.error(err);

        alert('เกิดข้อผิดพลาดในการสร้าง PDF');
    }

    btn.disabled=false;

    btn.classList.remove('loading');

    btn.innerHTML='📄 ออกรายงาน PDF';
}

if('serviceWorker' in navigator){

    navigator.serviceWorker
    .register('sw.js')
    .catch(err=>console.log(err));
}

</script>

</body>
</html>
