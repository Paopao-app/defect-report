<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inspection Pro - Advanced Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; margin: 0; }
        .pwa-app { max-width: 500px; margin: 0 auto; min-height: 100vh; background: white; padding-bottom: 120px; }
        
        /* Photo Editor Custom Styles */
        #editorCanvas { border: 2px solid #0f172a; max-width: 100%; cursor: crosshair; touch-action: none; background: #000; border-radius: 12px; }
        .tool-btn { padding: 8px 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: white; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .tool-btn.active { background: #4f46e5; color: white; border-color: #4f46e5; transform: scale(1.05); }

        @media print {
            body { background: white; }
            .no-print { display: none !important; }
            #pdf-content { display: block !important; }
            @page { size: A4; margin: 10mm 15mm; }
            .print-page { display: block; width: 100%; page-break-after: always; min-height: auto; }
            .print-page:last-child { page-break-after: auto !important; }
            .grid-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 15pt; margin-top: 10px; }
            .defect-card { border: 1.5pt solid #0f172a; display: flex; flex-direction: column; background: #fff; break-inside: avoid; }
            .card-header { background-color: #0f172a !important; color: white !important; padding: 6pt; text-align: center; font-weight: bold; font-size: 12pt; -webkit-print-color-adjust: exact; }
            .img-container { height: 75mm; width: 100%; background: #f8fafc; display: flex; align-items: center; justify-content: center; overflow: hidden; }
            .defect-img { max-width: 100%; max-height: 100%; object-fit: contain; }
            .card-body { padding: 10pt; text-align: center; font-size: 12pt; border-top: 1.5pt solid #0f172a; min-height: 40pt; display: flex; align-items: center; justify-content: center; }
            .sig-area { margin-top: 30px; display: flex; justify-content: space-around; padding: 20pt 0; border-top: 1pt solid #cbd5e1; }
        }
    </style>
</head>
<body>

    <div class="pwa-app shadow-2xl no-print">
        <header class="bg-[#0f172a] text-white p-6 rounded-b-[2.5rem] shadow-xl">
            <h1 class="text-2xl font-bold mb-4 tracking-tight">Inspection Pro <span class="text-indigo-400 text-sm font-normal">v5.7.2</span></h1>
            
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="projName" placeholder="ชื่อโครงการ" class="bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none placeholder:text-white/40">
                    <input type="text" id="inspectorName" placeholder="ผู้ตรวจสอบ" class="bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none placeholder:text-white/40">
                </div>
                
                <div class="grid grid-cols-3 gap-2">
                    <input type="text" id="roomNum" placeholder="ห้อง" class="bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none placeholder:text-white/40">
                    <input type="text" id="floorNum" placeholder="ชั้น" class="bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none placeholder:text-white/40">
                    <input type="text" id="areaName" placeholder="ส่วนกลาง" class="bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none placeholder:text-white/40">
                </div>

                <select id="workType" class="w-full bg-white/10 border border-white/20 rounded-xl p-3 text-white outline-none">
                    <option class="text-slate-900" value="">-- เลือกประเภทงาน --</option>
                    <option class="text-slate-900">ตรวจ SLEEVE พื้นห้องน้ำ,ระเบียง</option>
                    <option class="text-slate-900">ตรวจ OUTLET ผนังห้องน้ำ,ระเบียง</option>
                    <option class="text-slate-900">ตรวจ OUTLET ภายในห้องก่อนฉาบ</option>
                    <option class="text-slate-900">ตรวจตำแหน่ง SPRINKLER</option>
                    <option class="text-slate-900">ตรวจตำแหน่ง FCU</option>
                    <option class="text-slate-900">ตรวจติดตั้ง CDU</option>
                    <option class="text-slate-900">ตรวจติดตั้งสุขภัณฑ์</option>
                    <option class="text-slate-900">ตรวจระบบเหนือฝ้า</option>
                    <option class="text-slate-900">ตรวจวัดค่าลม EXHAUST</option>
                    <option class="text-slate-900">ตรวจงานทดสอบวงจรไฟฟ้า</option>
                    <option class="text-slate-900">ตรวจงานทดสอบแรงดันท่อดับเพลิง</option>
                    <option class="text-slate-900">ตรวจงานทดสอบแรงดันท่อเครื่องปรับอากาศ</option>
                    <option class="text-slate-900">ตรวจสอบ GRAVITY S,W,V,KW,RL</option>
                    <option class="text-slate-900">ตรวจสอบ SLOPE ท่อน้ำทิ้งแอร์</option>
                    <option class="text-slate-900">ตรวจงานทดสอบสายเมนไฟฟ้า</option>
                </select>
            </div>
        </header>

        <main class="p-6">
            <div id="editorArea" class="hidden mb-6 bg-slate-50 p-4 rounded-3xl border-2 border-dashed border-slate-200">
                <div class="flex flex-wrap gap-2 mb-4 justify-center">
                    <button onclick="setTool('circle')" id="btn-circle" class="tool-btn">⭕ วง</button>
                    <button onclick="setTool('rect')" id="btn-rect" class="tool-btn">⬜ เหลี่ยม</button>
                    <button onclick="setTool('arrow')" id="btn-arrow" class="tool-btn">⬆️ ลูกศร</button>
                    <button onclick="setTool('pen')" id="btn-pen" class="tool-btn">✏️ วาด</button>
                    <button onclick="stampIcon('PASS')" class="tool-btn bg-green-500 text-white border-none">✅ ผ่าน</button>
                    <button onclick="stampIcon('FAIL')" class="tool-btn bg-red-500 text-white border-none">❌ ไม่ผ่าน</button>
                    <button onclick="clearCanvas()" class="tool-btn bg-slate-800 text-white border-none">ล้าง</button>
                </div>
                <canvas id="editorCanvas" class="shadow-lg"></canvas>
                <p class="text-center text-xs text-slate-400 mt-2">วาดทับลงบนรูปเพื่อระบุตำแหน่ง</p>
            </div>

            <div class="bg-white rounded-3xl p-5 border border-slate-100 shadow-sm mb-6">
                <textarea id="defectTitle" placeholder="ระบุรายละเอียด..." class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none resize-none focus:border-indigo-500 transition-all"></textarea>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="document.getElementById('cameraInput').click()" class="bg-slate-800 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-black transition-all">📸 ถ่ายรูป/เลือกรูป</button>
                    <button onclick="addListItem()" class="bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all">เพิ่มรายการ</button>
                </div>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
            </div>

            <div id="displayList" class="space-y-4"></div>
        </main>

        <div id="actionArea" class="hidden fixed bottom-8 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">
            <button onclick="exportToPDF()" class="w-full bg-emerald-600 text-white py-5 rounded-3xl font-bold shadow-2xl flex items-center justify-center gap-2 hover:bg-emerald-700">
                📄 ออกรายงาน PDF (V5.7 Report)
            </button>
        </div>
    </div>

    <div id="pdf-content" class="hidden"></div>

    <script>
        let defectData = [];
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        let currentTool = 'pen';
        let isDrawing = false;
        let startX, startY;
        let originalImage = null;

        // --- Image Handling & Editor ---
        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    const img = new Image();
                    img.onload = () => {
                        originalImage = img;
                        const aspect = img.height / img.width;
                        canvas.width = 1000;
                        canvas.height = 1000 * aspect;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        document.getElementById('editorArea').classList.remove('hidden');
                        document.getElementById('editorArea').scrollIntoView({ behavior: 'smooth' });
                    };
                    img.src = f.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        function setTool(tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + tool)?.classList.add('active');
        }

        function clearCanvas() { ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height); }

        function startDraw(e) {
            isDrawing = true;
            const pos = getMousePos(e);
            startX = pos.x;
            startY = pos.y;
            if(currentTool === 'pen') { ctx.beginPath(); ctx.moveTo(startX, startY); }
        }

        function drawing(e) {
            if (!isDrawing || currentTool !== 'pen') return;
            const pos = getMousePos(e);
            ctx.strokeStyle = "red";
            ctx.lineWidth = 6;
            ctx.lineCap = "round";
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function endDraw(e) {
            if (!isDrawing) return;
            const pos = getMousePos(e);
            ctx.strokeStyle = "red";
            ctx.lineWidth = 6;
            
            if (currentTool === 'circle') {
                const r = Math.sqrt(Math.pow(pos.x - startX, 2) + Math.pow(pos.y - startY, 2));
                ctx.beginPath();
                ctx.arc(startX, startY, r, 0, 2 * Math.PI);
                ctx.stroke();
            } else if (currentTool === 'rect') {
                ctx.strokeRect(startX, startY, pos.x - startX, pos.y - startY);
            } else if (currentTool === 'arrow') {
                drawArrow(startX, startY, pos.x, pos.y);
            }
            isDrawing = false;
        }

        function getMousePos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
        }

        function drawArrow(x1, y1, x2, y2) {
            const headlen = 30;
            const angle = Math.atan2(y2-y1, x2-x1);
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x2, y2);
            ctx.lineTo(x2-headlen*Math.cos(angle-Math.PI/6), y2-headlen*Math.sin(angle-Math.PI/6));
            ctx.lineTo(x2-headlen*Math.cos(angle+Math.PI/6), y2-headlen*Math.sin(angle+Math.PI/6));
            ctx.closePath();
            ctx.fillStyle = "red";
            ctx.fill();
        }

        function stampIcon(type) {
            ctx.font = "bold 65px Sarabun";
            ctx.textAlign = "center";
            if(type === 'PASS') {
                ctx.fillStyle = "#22c55e";
                ctx.fillText("✅ PASS / ผ่าน", canvas.width/2, canvas.height - 60);
            } else {
                ctx.fillStyle = "#ef4444";
                ctx.fillText("❌ FAIL / ไม่ผ่าน", canvas.width/2, canvas.height - 60);
            }
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mousemove', drawing);
        canvas.addEventListener('mouseup', endDraw);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); drawing(e); });
        canvas.addEventListener('touchend', endDraw);

        // --- Core Logic ---
        function addListItem() {
            const title = document.getElementById('defectTitle').value;
            if(!title || !originalImage) return alert("กรุณาเลือกรูปและระบุรายละเอียด");
            
            const img = canvas.toDataURL('image/jpeg', 0.85);
            defectData.push({ title, img });
            renderUI();
            
            document.getElementById('defectTitle').value = '';
            document.getElementById('editorArea').classList.add('hidden');
            originalImage = null;
        }

        function renderUI() {
            const list = document.getElementById('displayList');
            list.innerHTML = '';
            defectData.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "bg-white p-4 rounded-2xl flex items-center gap-4 border shadow-sm border-slate-100";
                div.innerHTML = `
                    <img src="${item.img}" class="w-20 h-20 object-cover rounded-xl border">
                    <div class="flex-1 font-bold text-slate-700">${index+1}. ${item.title}</div>
                    <button onclick="deleteItem(${index})" class="text-rose-500 p-2 font-bold text-lg">✕</button>
                `;
                list.appendChild(div);
            });
            document.getElementById('actionArea').classList.toggle('hidden', defectData.length === 0);
        }

        function deleteItem(i) { defectData.splice(i, 1); renderUI(); }

        // --- Report Engine V5.7 ---
        function exportToPDF() {
            const container = document.getElementById('pdf-content');
            container.innerHTML = '';
            const totalPages = Math.ceil(defectData.length / 4);

            for(let p = 0; p < totalPages; p++) {
                const pageDiv = document.createElement('div');
                pageDiv.className = "print-page";
                pageDiv.innerHTML = `
                    <div style="display:flex; justify-content:space-between; border-bottom:3pt solid #0f172a; padding-bottom:12px; margin-bottom:20px;">
                        <div style="width: 75%;">
                            <h2 style="margin:0; font-size:22pt; color:#0f172a; font-weight:800; letter-spacing:-1px;">INSPECTION REPORT</h2>
                            <p style="margin:6pt 0; font-size:12pt; line-height:1.4;">
                                <b>ประเภทงาน:</b> ${document.getElementById('workType').value || '-'}<br>
                                <b>โครงการ:</b> ${document.getElementById('projName').value || '-'} | 
                                <b>ตำแหน่ง:</b> ห้อง ${document.getElementById('roomNum').value || '-'} ชั้น ${document.getElementById('floorNum').value || '-'} (${document.getElementById('areaName').value || '-'})
                            </p>
                        </div>
                        <div style="text-align:right;">
                            <p style="margin:0; font-size:11pt;">ผู้ตรวจสอบ: <b>${document.getElementById('inspectorName').value || '-'}</b></p>
                            <p style="margin:5px 0 0 0; color:#0f172a; font-weight:bold; font-size:14pt;">หน้า ${p+1} / ${totalPages}</p>
                        </div>
                    </div>
                    <div class="grid-layout">
                        ${defectData.slice(p * 4, p * 4 + 4).map((item, i) => `
                            <div class="defect-card">
                                <div class="card-header">รายการที่ ${(p*4)+i+1}</div>
                                <div class="img-container"><img src="${item.img}" class="defect-img"></div>
                                <div class="card-body"><b>${item.title}</b></div>
                            </div>
                        `).join('')}
                    </div>
                    ${p === totalPages - 1 ? `
                        <div class="sig-area">
                            <div style="text-align:center;">______________________<br>ลงชื่อผู้ตรวจสอบ</div>
                            <div style="text-align:center;">______________________<br>ลงชื่อผู้รับงาน</div>
                        </div>
                    ` : ''}
                `;
                container.appendChild(pageDiv);
            }
            window.print();
        }
    </script>
</body>
</html>
