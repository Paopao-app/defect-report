<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Defect Pro v3.8 - Production</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
        .pwa-app { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: white; }
        
        /* เทคนิค Off-screen rendering: ทำให้มองเห็นแต่ไม่อยู่ในจุดที่รบกวนหน้าจอ */
        #pdf-render-area { 
            position: fixed;
            top: 0;
            left: 0;
            width: 800px;
            z-index: -9999;
            background: white;
            color: black;
            visibility: hidden;
        }
    </style>
</head>
<body>
    <div class="pwa-app shadow-xl">
        <header class="bg-indigo-950 text-white p-6 rounded-b-[2.5rem] shadow-lg">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold">Inspection Pro</h1>
                <button onclick="resetApp()" class="p-2 bg-indigo-900/50 rounded-full text-indigo-300">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
            <div class="space-y-3">
                <input type="text" id="projName" placeholder="ชื่อโครงการ" class="w-full bg-indigo-900/40 border border-indigo-800 rounded-2xl p-3.5 text-sm text-white">
                <input type="text" id="inspectorName" placeholder="ชื่อผู้ตรวจสอบ" class="w-full bg-indigo-900/40 border border-indigo-800 rounded-2xl p-3.5 text-sm text-white">
            </div>
        </header>

        <main class="p-6 flex-1">
            <div class="bg-white rounded-3xl p-5 mb-8 border border-slate-100 shadow-sm">
                <input type="text" id="defectTitle" placeholder="รายละเอียดความเสียหาย" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl mb-4">
                <div id="previewContainer" class="hidden mb-4 relative">
                    <img id="imgPreview" class="w-full h-52 object-cover rounded-2xl shadow-md border">
                    <button onclick="clearImage()" class="absolute -top-2 -right-2 bg-rose-500 text-white w-8 h-8 rounded-full shadow-lg font-bold">✕</button>
                </div>
                <div class="flex gap-3">
                    <button onclick="document.getElementById('cameraInput').click()" class="flex-1 bg-indigo-50 text-indigo-700 font-bold py-4 rounded-2xl border border-indigo-100">📸 ถ่ายรูป</button>
                    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden">
                    <button onclick="addListItem()" class="flex-[1.5] bg-indigo-600 text-white font-bold py-4 rounded-2xl shadow-lg">เพิ่มลงรายการ</button>
                </div>
            </div>
            <div id="displayList" class="space-y-4 pb-32"></div>
        </main>

        <div id="actionArea" class="hidden fixed bottom-8 left-0 right-0 px-6 max-w-[500px] mx-auto z-50">
            <button onclick="exportToPDF()" id="btnPdf" class="w-full bg-emerald-600 text-white py-4.5 rounded-2xl font-bold shadow-2xl flex justify-center items-center gap-3">
                <span id="btnText">📄 ออกรายงาน PDF</span>
            </button>
        </div>
    </div>

    <div id="pdf-render-area">
        <div style="border-bottom: 6px solid #1e1b4b; padding-bottom: 25px; display: flex; justify-content: space-between; align-items: flex-end;">
            <div>
                <h1 style="font-size: 32px; color: #1e1b4b; margin: 0; font-weight: 700;">INSPECTION REPORT</h1>
                <p id="pdf_project_text" style="font-size: 18px; color: #475569; margin: 8px 0 0 0;"></p>
            </div>
            <div style="text-align: right; color: #475569;">
                <p id="pdf_date_text" style="font-weight: 700; margin: 0; font-size: 16px;"></p>
                <p id="pdf_inspector_text" style="margin: 5px 0 0 0; font-size: 16px;"></p>
            </div>
        </div>
        <table style="width: 100%; margin-top: 35px; border-collapse: collapse;">
            <thead>
                <tr style="background-color: #1e1b4b; color: white;">
                    <th style="padding: 15px; border: 1px solid #e2e8f0; width: 60px;">#</th>
                    <th style="padding: 15px; border: 1px solid #e2e8f0; text-align: left;">รายละเอียดความเสียหาย</th>
                    <th style="padding: 15px; border: 1px solid #e2e8f0; width: 380px;">ภาพหลักฐานหน้างาน</th>
                </tr>
            </thead>
            <tbody id="pdf_table_body"></tbody>
        </table>
    </div>

    <script>
        let defectData = [];

        document.getElementById('cameraInput').onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (f) => {
                    document.getElementById('imgPreview').src = f.target.result;
                    document.getElementById('previewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function clearImage() {
            document.getElementById('cameraInput').value = '';
            document.getElementById('previewContainer').classList.add('hidden');
        }

        function addListItem() {
            const title = document.getElementById('defectTitle').value;
            const img = document.getElementById('imgPreview').src;
            if(!title || !img) return alert("ระบุรายละเอียดและถ่ายรูปก่อนครับ");
            defectData.push({ title, img });
            renderUI();
            document.getElementById('defectTitle').value = '';
            clearImage();
        }

        function renderUI() {
            const list = document.getElementById('displayList');
            const action = document.getElementById('actionArea');
            list.innerHTML = ''; 
            if(defectData.length > 0) {
                action.classList.remove('hidden');
                defectData.forEach((item, index) => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = "bg-white p-4 rounded-2xl flex items-center gap-4 border border-slate-100 shadow-sm";
                    itemDiv.innerHTML = `<img src="${item.img}" class="w-16 h-16 object-cover rounded-xl border shadow-sm"><div class="flex-1 font-bold text-slate-700 text-sm">${index+1}. ${item.title}</div><button onclick="deleteItem(${index})" class="text-rose-400 p-2 font-bold">✕</button>`;
                    list.appendChild(itemDiv);
                });
            } else { action.classList.add('hidden'); }
        }

        function deleteItem(i) { defectData.splice(i, 1); renderUI(); }

        function resetApp() {
            if(confirm("ล้างข้อมูลทั้งหมด?")) {
                defectData = [];
                document.getElementById('projName').value = '';
                document.getElementById('inspectorName').value = '';
                renderUI();
            }
        }

        // --- PROFESSIONAL PDF LOGIC ---
        async function exportToPDF() {
            const btnText = document.getElementById('btnText');
            const btn = document.getElementById('btnPdf');
            btnText.innerText = "⏳ กำลังวาดรูปภาพ...";
            btn.disabled = true;

            // ตั้งค่าข้อมูลพื้นฐาน
            document.getElementById('pdf_project_text').innerText = "โครงการ: " + (document.getElementById('projName').value || "-");
            document.getElementById('pdf_inspector_text').innerText = "ผู้ตรวจสอบ: " + (document.getElementById('inspectorName').value || "-");
            document.getElementById('pdf_date_text').innerText = "วันที่ตรวจ: " + new Date().toLocaleDateString('th-TH');

            const tableBody = document.getElementById('pdf_table_body');
            tableBody.innerHTML = '';

            // 1. วาดตาราง PDF และรอให้รูปภาพทุกลูกโหลดเข้า DOM สำเร็จ
            const imgLoadPromises = defectData.map((item, index) => {
                return new Promise((resolve) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="padding: 15px; border: 1px solid #e2e8f0; text-align: center; vertical-align: top;">${index+1}</td>
                        <td style="padding: 15px; border: 1px solid #e2e8f0; vertical-align: top; font-weight: bold;">${item.title}</td>
                        <td style="padding: 15px; border: 1px solid #e2e8f0; text-align: center;">
                            <img src="${item.img}" style="width: 320px; border-radius: 8px; display: block; margin: 0 auto;">
                        </td>
                    `;
                    tableBody.appendChild(tr);
                    const img = tr.querySelector('img');
                    if (img.complete) resolve(); else img.onload = resolve;
                });
            });

            await Promise.all(imgLoadPromises);
            btnText.innerText = "📄 กำลังสร้างไฟล์ PDF...";

            const element = document.getElementById('pdf-render-area');
            element.style.visibility = "visible"; // เปิดให้ Library เห็นชั่วคราว

            const opt = { 
                margin: 10, 
                filename: 'Inspection_Report.pdf', 
                image: { type: 'jpeg', quality: 0.98 }, 
                html2canvas: { scale: 2, useCORS: true, letterRendering: true }, 
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } 
            };

            try {
                // ใช้ระบบ Output แบบ Blob URL ที่คุณยืนยันว่าทำงานได้ดี
                const pdfBlob = await html2pdf().set(opt).from(element).toPdf().output('bloburl');
                const link = document.createElement('a');
                link.href = pdfBlob;
                link.target = '_blank';
                link.click();
            } catch (err) {
                alert("ขออภัย เกิดข้อผิดพลาดทางเทคนิค กรุณาลองอีกครั้งครับ");
            } finally {
                element.style.visibility = "hidden";
                btnText.innerText = "📄 ออกรายงาน PDF";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
